name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install --yes just
      - run: pnpm install --frozen-lockfile
      - run: just verify
      - run: pnpm audit --prod
      - run: pnpm --filter @slop-lab/dev-infra-manager-core run pack:dry-run
      - run: pnpm --filter @slop-lab/dim-cli run pack:dry-run
      - run: pnpm --filter @slop-lab/install-dim run pack:dry-run

  nested-container:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install --yes just jq
      - run: pnpm install --frozen-lockfile
      - run: just container-runtime-verify
